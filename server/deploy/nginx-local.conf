# Nginx-конфиг для Raspberry Pi.
# Проксирует порт 80 → Next.js (3000), так что пользователь
# открывает http://nevsky-songs.local  (без порта).
#
# Установка на RPi:
#   sudo apt install nginx -y
#   sudo cp nginx-local.conf /etc/nginx/sites-available/nevsky-songs
#   sudo ln -s /etc/nginx/sites-available/nevsky-songs /etc/nginx/sites-enabled/nevsky-songs
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;  # любой хостнейм: nevsky-songs.local, 192.168.1.37, localhost

    # Проксируем всё на Next.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # WebSocket для кликера (порт 3001)
    location /ws-clicker {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
